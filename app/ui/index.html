<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parser Viewer</title>
    <script>
      // Apply persisted shop name to title before React mounts
      try {
        const cfg = JSON.parse(localStorage.getItem("spaila_shop_config") || "{}");
        if (cfg.shopName && cfg.shopName.trim()) document.title = cfg.shopName.trim();
      } catch (_) {}
    </script>
    <link rel="icon" type="image/x-icon" href="./spaila-logo.blue.ico" />
    <link rel="stylesheet" href="./dist/renderer.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="./dist/renderer.js"></script>
  </body>
  </html>
